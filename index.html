<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="quiz-container">
        <h1 id="question-title">⚽ Football Quiz</h1>
        
        <div id="timer-box" style="font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; color: #e74c3c; text-align: center;"></div>
        
        <p id="question-text">Добро пожаловать в футбольную викторину! Выберите уровень сложности:</p>
        
        <div id="answer-buttons">
            <button class="btn btn-easy" onclick="startQuiz('easy')">Легкий 🟢</button>
            <button class="btn btn-medium" onclick="startQuiz('medium')">Средний 🟡</button>
            <button class="btn btn-hard" onclick="startQuiz('hard')">Сложный 🔴</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
